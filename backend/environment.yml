name: watsonx
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.12
  - pip
  - pip:
      # Core ADK
      - ibm-watsonx-orchestrate==2.9.0
      
      # LLM APIs (choose one or use both)
      - groq==0.11.0                    # GroqCloud API (recommended - simple, fast, free tier)
      - ibm-watsonx-ai==1.1.0          # watsonx.ai SDK (requires IBM Cloud provisioning)
      - ibm-cloud-sdk-core==3.20.0
      
      # FastAPI Backend
      - fastapi==0.115.0
      - uvicorn==0.32.0
      - sse-starlette==2.1.3
      
      # HTTP Clients
      - httpx==0.27.0
      - requests==2.32.3
      
      # Data & Config
      - pydantic==2.8.0
      - pyyaml==6.0.1
      - python-dotenv==1.0.0

# Complete environment for AgentForge
# Includes: ADK, LLM APIs (Groq + watsonx.ai), FastAPI backend, HTTP clients, and utilities
# Critical: Python 3.12 required (3.13 breaks pip/ADK compatibility)
#
# LLM Options:
# - groq_runner.py: Uses GroqCloud (recommended - no IBM provisioning needed)
# - watsonx_runner.py: Uses watsonx.ai (requires IBM Cloud project)
# - bob_runner.py: Legacy (Bob Shell CLI not publicly available)

